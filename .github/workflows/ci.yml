---
name: Continuous Integration
on:
  - pull_request
  - workflow_dispatch
env:
  MODEL_URL: https://huggingface.co/TheBloke/CodeLlama-7B-GGUF/resolve/main/codellama-7b.Q2_K.gguf
  MODEL_NAME: codellama-7b.Q2_K.gguf
  RERANKING_MODEL_URL: https://huggingface.co/gpustack/jina-reranker-v1-tiny-en-GGUF/resolve/main/jina-reranker-v1-tiny-en-Q4_0.gguf
  RERANKING_MODEL_NAME: jina-reranker-v1-tiny-en-Q4_0.gguf
  DRAFT_MODEL_URL: https://huggingface.co/QuantFactory/AMD-Llama-135m-code-GGUF/resolve/main/AMD-Llama-135m-code.Q2_K.gguf
  DRAFT_MODEL_NAME: AMD-Llama-135m-code.Q2_K.gguf
jobs:

  build-and-test-linux:
    name: ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "11"
      - name: Build libraries
        run: |
          mvn compile
          .github/build.sh -DLLAMA_VERBOSE=ON -DBUILD_TESTING=ON
      - name: Run C++ unit tests
        run: ctest --test-dir build --output-on-failure
      - name: Download text generation model
        run: curl -L --fail ${MODEL_URL} --create-dirs -o models/${MODEL_NAME}
      - name: Download reranking model
        run: curl -L --fail ${RERANKING_MODEL_URL} --create-dirs -o models/${RERANKING_MODEL_NAME}
      - name: Download draft model
        run: curl -L --fail ${DRAFT_MODEL_URL} --create-dirs -o models/${DRAFT_MODEL_NAME}
      - name: List files in models directory
        run: ls -l models/
      - name: Run Java tests
        run: mvn test
      - if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: error-log-linux
          path: ${{ github.workspace }}/hs_err_pid*.log
          if-no-files-found: warn

  build-and-test-macos:
    name: ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - runner: macos-15
            name: macos-15-no-metal
            cmake: -DLLAMA_METAL=OFF -DLLAMA_VERBOSE=ON -DGGML_NATIVE=OFF
            mvn_test_args: ""
          - runner: macos-14
            name: macos-14-metal
            cmake: -DLLAMA_METAL_EMBED_LIBRARY=ON -DLLAMA_VERBOSE=ON
            mvn_test_args: "-Dde.kherud.llama.test.ngl=0"
          - runner: macos-15
            name: macos-15-metal
            cmake: -DLLAMA_METAL_EMBED_LIBRARY=ON -DLLAMA_VERBOSE=ON -DGGML_NATIVE=OFF
            mvn_test_args: ""
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "11"
      - name: Build libraries
        run: |
          mvn compile
          .github/build.sh ${{ matrix.target.cmake }} -DBUILD_TESTING=ON
      - name: Run C++ unit tests
        run: ctest --test-dir build --output-on-failure
      - name: Download text generation model
        run: curl -L --fail ${MODEL_URL} --create-dirs -o models/${MODEL_NAME}
      - name: Download reranking model
        run: curl -L --fail ${RERANKING_MODEL_URL} --create-dirs -o models/${RERANKING_MODEL_NAME}
      - name: Download draft model
        run: curl -L --fail ${DRAFT_MODEL_URL} --create-dirs -o models/${DRAFT_MODEL_NAME}
      - name: List files in models directory
        run: ls -l models/
      - name: Run Java tests
        run: mvn test ${{ matrix.target.mvn_test_args }}
      - if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: error-log-${{ matrix.target.name }}
          path: ${{ github.workspace }}/hs_err_pid*.log
          if-no-files-found: warn

  build-and-test-windows:
    name: windows-2022
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '11'
      - name: Build libraries
        run: |
          mvn compile
          .github\build.bat -DLLAMA_VERBOSE=ON -DBUILD_TESTING=ON
      - name: Run C++ unit tests
        run: ctest --test-dir build --output-on-failure
      - name: Download model
        run: curl -L --fail $env:MODEL_URL --create-dirs -o models/$env:MODEL_NAME
      - name: Download reranking model
        run: curl -L --fail $env:RERANKING_MODEL_URL --create-dirs -o models/$env:RERANKING_MODEL_NAME
      - name: Download draft model
        run: curl -L --fail $env:DRAFT_MODEL_URL --create-dirs -o models/$env:DRAFT_MODEL_NAME
      - name: List files in models directory
        run: ls -l models/
      - name: Run Java tests
        run: mvn test
      - if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: windows-output
          path: |
            ${{ github.workspace }}\hs_err_pid*.log
            ${{ github.workspace }}/src/main/resources/de/kherud/llama/**/*
          if-no-files-found: warn
